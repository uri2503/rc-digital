<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0d1017;color:#f0f2f8;overflow:hidden;height:100vh;width:100vw;user-select:none}

/* TOOLBAR */
.toolbar{position:fixed;top:0;left:0;right:0;height:56px;background:#12151fee;backdrop-filter:blur(16px);border-bottom:1px solid #2d3450;display:flex;align-items:center;gap:10px;padding:0 16px;z-index:200;flex-wrap:nowrap;overflow-x:auto}
.logo{font-weight:800;font-size:14px;letter-spacing:-.3px;white-space:nowrap;margin-right:6px}
.logo .b1{color:#2563eb}.logo .b2{color:#c9a84c}.logo .b3{color:#f59e0b}
.sep{width:1px;height:24px;background:#2d3450;flex-shrink:0}
.filters{display:flex;gap:5px;align-items:center;flex-wrap:nowrap}
.f-btn{background:#1a1f2e;border:1px solid #2d3450;color:#8b92b0;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.f-btn:hover{color:#f0f2f8;border-color:#8b92b0}
.f-btn.active{color:#000;border-color:transparent}
.tb-right{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.tb-btn{background:#1a1f2e;border:1px solid #2d3450;color:#8b92b0;padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.tb-btn:hover{color:#f0f2f8;border-color:#8b92b0}

/* CANVAS */
#canvas{position:fixed;inset:0;top:56px;cursor:grab;touch-action:none}
#canvas:active{cursor:grabbing}

/* BREADCRUMB */
.breadcrumb{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a1f2ecc;backdrop-filter:blur(8px);border:1px solid #2d3450;border-radius:20px;padding:6px 16px;font-size:11px;color:#8b92b0;pointer-events:none;transition:opacity .3s;white-space:nowrap}

/* TOOLTIP */
.tip{position:fixed;background:#1a1f2e;border:1px solid #2d3450;border-radius:10px;padding:12px 16px;max-width:260px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:300;font-size:12px;line-height:1.6;box-shadow:0 8px 32px #00000088}
.tip.show{opacity:1}
.tip-title{font-weight:700;font-size:13px;margin-bottom:3px}
.tip-repo{font-family:monospace;font-size:10px;margin-bottom:6px;opacity:.7}
.tip-desc{font-size:11px;opacity:.85;margin-bottom:6px;line-height:1.5}
.tip-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.tip-tag{background:#2d3450;padding:2px 7px;border-radius:8px;font-size:10px;color:#8b92b0}
.tip-icons{display:flex;gap:6px;margin-top:7px;font-size:11px}
.tip-hint{font-size:10px;opacity:.5;margin-top:6px;font-style:italic}

/* LOADING */
.loading{position:fixed;inset:0;top:56px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#0d1017}
.loading-dot{width:8px;height:8px;background:var(--amber,#f59e0b);border-radius:50%;animation:lpulse 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
.loading-dots{display:flex;gap:6px}
@keyframes lpulse{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
</style>
</head>

// ── INIT ──
function init() {
  buildFilterBar();
  document.getElementById('loading').style.display = 'none';
  canvas.style.display = 'block';
  resize();
}

function getHubId(brand) {
  return BRAND_HUB[brand] || 'intern';
}

function getHubForId(id) {
  for (var i=0;i<HUBS.length;i++) if (HUBS[i].id===id) return HUBS[i];
  return null;
}

// ── FILTER BAR ──
function buildFilterBar() {
  var bar = document.getElementById('filterBar');
  // Status filters
  var statuses = ['live','wip','pause','intern'];
  var labels = {live:'✓ Live', wip:'⚡ WIP', pause:'⏸ Pause', intern:'🔒 Intern'};
  var colors = {live:'#10b981',wip:'#f59e0b',pause:'#6b7280',intern:'#8b5cf6'};
  statuses.forEach(function(s) {
    var b = document.createElement('button');
    b.className = 'f-btn';
    b.textContent = labels[s];
    b.setAttribute('data-filter', s);
    b.onclick = function() { setFilter(s, b); };
    b.style.setProperty('--c', colors[s]);
    bar.appendChild(b);
  });
}

function setFilter(val, btn) {
  activeFilter = val;
  var btns = document.querySelectorAll('.f-btn');
  btns.forEach(function(b) {
    b.classList.remove('active');
    b.style.background = '';
    b.style.color = '';
    b.style.borderColor = '';
  });
  btn.classList.add('active');
  if (val === 'all') {
    btn.style.background = '#2563eb';
    btn.style.color = '#fff';
  } else {
    var colors = {live:'#10b981',wip:'#f59e0b',pause:'#6b7280',intern:'#8b5cf6'};
    btn.style.background = colors[val] || '#2563eb';
    btn.style.color = '#fff';
  }
  focusHub = null;
  computePositions();
  draw();
  updateBreadcrumb();
}

// ── VISIBLE PROJECTS ──
function visibleProjects() {
  return allProjects.filter(function(p) {
    if (activeFilter !== 'all' && p.status !== activeFilter) return false;
    if (focusHub && getHubId(p.brand) !== focusHub) return false;
    return true;
  });
}

function visibleHubs() {
  if (focusHub) return HUBS.filter(function(h){return h.id===focusHub;});
  var usedHubs = {};
  visibleProjects().forEach(function(p){ usedHubs[getHubId(p.brand)] = true; });
  return HUBS.filter(function(h){ return usedHubs[h.id]; });
}

// ── LAYOUT ──
function computePositions() {
  positions = {};
  hubPos = {};

  var vhubs = visibleHubs();
  var vprojects = visibleProjects();

  if (focusHub) {
    // Single hub in center
    var hub = getHubForId(focusHub);
    hubPos[focusHub] = {x:0, y:0};
    var nodes = vprojects;
    var n = nodes.length;
    nodes.forEach(function(p, i) {
      var angle = (i / n) * 2 * Math.PI - Math.PI/2;
      var r = Math.max(150, 60 + n * 18);
      var key = p.name;
      positions[key] = {
        x: Math.cos(angle) * r,
        y: Math.sin(angle) * r,
        project: p, hub: hub
      };
    });
  } else {
    // All hubs arranged in circle
    var n = vhubs.length;
    vhubs.forEach(function(h, hi) {
      var angle = (hi / n) * 2 * Math.PI - Math.PI/2;
      hubPos[h.id] = {
        x: Math.cos(angle) * HUB_R,
        y: Math.sin(angle) * HUB_R
      };
    });

    // Nodes per hub
    var hubNodes = {};
    vprojects.forEach(function(p) {
      var hid = getHubId(p.brand);
      if (!hubNodes[hid]) hubNodes[hid] = [];
      hubNodes[hid].push(p);
    });

    Object.keys(hubNodes).forEach(function(hid) {
      var hp = hubPos[hid];
      if (!hp) return;
      var hub = getHubForId(hid);
      var nodes = hubNodes[hid];
      var cnt = nodes.length;
      // angle from center to hub
      var hubAngle = Math.atan2(hp.y, hp.x);
      // spread nodes around that direction
      var spread = Math.min(Math.PI * 0.55, (Math.PI * 0.55) / Math.max(1, cnt / 4));
      nodes.forEach(function(p, ni) {
        var t = cnt === 1 ? 0 : (ni / (cnt-1) - 0.5);
        var angle = hubAngle + t * spread * 2;
        var dist = NODE_R + (ni % 2) * 28; // stagger
        var key = p.name;
        positions[key] = {
          x: Math.cos(angle) * dist,
          y: Math.sin(angle) * dist,
          project: p, hub: hub
        };
      });
    });
  }
}

// ── CANVAS ──
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight - 56;
  cx = W/2; cy = H/2;
  computePositions();
  draw();
}

function toScreen(wx, wy) {
  return { x:(wx+offX)*scale+cx, y:(wy+offY)*scale+cy };
}

function toWorld(sx, sy) {
  return { x:(sx-cx)/scale - offX, y:(sy-cy)/scale - offY };
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.fillStyle = '#1a1f2e18';
  var gs = 44*scale;
  var gx0 = ((offX*scale+cx)%gs+gs)%gs;
  var gy0 = ((offY*scale+cy)%gs+gs)%gs;
  for (var gx=gx0;gx<W;gx+=gs) for (var gy=gy0;gy<H;gy+=gs) {
    ctx.beginPath(); ctx.arc(gx,gy,1,0,Math.PI*2); ctx.fill();
  }

  if (!focusHub) {
    // Center node
    drawCenter();
    // Center→Hub lines
    HUBS.forEach(function(h) {
      var hp = hubPos[h.id];
      if (!hp) return;
      var s1 = toScreen(0,0), s2 = toScreen(hp.x,hp.y);
      ctx.beginPath(); ctx.moveTo(s1.x,s1.y); ctx.lineTo(s2.x,s2.y);
      ctx.strokeStyle = h.color+'44'; ctx.lineWidth=2*scale; ctx.stroke();
    });
  }

  // Hub→Node lines
  Object.keys(positions).forEach(function(key) {
    var pos = positions[key];
    var hub = pos.hub;
    if (!hub) return;
    var hp = focusHub ? {x:0,y:0} : hubPos[hub.id];
    if (!hp) return;
    var s1 = toScreen(hp.x,hp.y), s2 = toScreen(pos.x,pos.y);
    var isHov = hoveredKey === key;
    ctx.beginPath(); ctx.moveTo(s1.x,s1.y); ctx.lineTo(s2.x,s2.y);
    ctx.strokeStyle = isHov ? hub.color+'99' : hub.color+'2a';
    ctx.lineWidth = (isHov ? 2 : 1.2) * scale;
    ctx.stroke();
  });

  // Draw hubs
  visibleHubs().forEach(function(h) {
    drawHub(h);
  });

  // Draw nodes
  Object.keys(positions).forEach(function(key) {
    drawNode(key, positions[key]);
  });
}

function drawCenter() {
  var s = toScreen(0,0);
  var r = 50*scale;
  // Glow
  var g = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,r*2);
  g.addColorStop(0,'#2563eb28'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(s.x,s.y,r*2,0,Math.PI*2); ctx.fill();
  // Circle
  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
  ctx.fillStyle='#0d1017'; ctx.fill();
  ctx.strokeStyle='#2563eb'; ctx.lineWidth=2.5*scale; ctx.stroke();
  // Text
  ctx.fillStyle='#f0f2f8'; ctx.font='bold '+(12*scale)+'px Inter'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('URI RIEDEL',s.x,s.y-7*scale);
  ctx.fillStyle='#8b92b0'; ctx.font=(9*scale)+'px Inter';
  ctx.fillText('Portfolio · '+allProjects.length+' Projekte',s.x,s.y+8*scale);
}

function drawHub(h) {
  var hp = focusHub ? {x:0,y:0} : hubPos[h.id];
  if (!hp) return;
  var s = toScreen(hp.x,hp.y);
  var r = (focusHub ? 52 : h.r) * scale;
  var isClickable = !focusHub;

  // Glow
  var g = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,r*2.2);
  g.addColorStop(0,h.color+'20'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(s.x,s.y,r*2.2,0,Math.PI*2); ctx.fill();

  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
  ctx.fillStyle=h.bg; ctx.fill();
  ctx.strokeStyle=h.color; ctx.lineWidth=(focusHub?3:2)*scale; ctx.stroke();

  var lines = h.label.split('\n');
  ctx.fillStyle=h.color; ctx.font='bold '+(11*scale)+'px Inter';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  var lh=13*scale;
  lines.forEach(function(line,i){
    ctx.fillText(line, s.x, s.y+(i-(lines.length-1)/2)*lh);
  });
  if (scale>0.65) {
    ctx.fillStyle=h.color+'88'; ctx.font=(8*scale)+'px Inter';
    ctx.fillText(h.sublabel,s.x,s.y+r+11*scale);
  }
  if (isClickable && scale>0.55) {
    ctx.fillStyle='#ffffff28'; ctx.font=(7.5*scale)+'px Inter';
    ctx.fillText('↗ Klick zum Einzoomen',s.x,s.y+r+22*scale);
  }
}

function drawNode(key, pos) {
  var p = pos.project;
  var hub = pos.hub;
  if (!hub) return;
  var s = toScreen(pos.x,pos.y);
  var isHov = hoveredKey===key;
  var st = STATUS[p.status] || STATUS['intern'];

  var pw = (isHov?120:112)*scale;
  var ph = (isHov?50:44)*scale;
  var rx = 8*scale;

  // Shadow
  if (isHov) { ctx.shadowColor=hub.color+'66'; ctx.shadowBlur=18*scale; }

  // Card
  ctx.beginPath(); roundRect(ctx,s.x-pw/2,s.y-ph/2,pw,ph,rx);
  ctx.fillStyle = isHov ? hub.bg : '#0d1017ee';
  ctx.fill();
  ctx.strokeStyle = isHov ? hub.color : hub.color+'55';
  ctx.lineWidth=(isHov?2:1.2)*scale; ctx.stroke();
  ctx.shadowBlur=0;

  // Status bar on left
  var bw=3*scale;
  ctx.beginPath(); roundRect(ctx,s.x-pw/2,s.y-ph/2+rx/2,bw,ph-rx,2*scale);
  ctx.fillStyle=st.color; ctx.fill();

  // Name
  ctx.fillStyle = isHov ? '#fff' : hub.color+'cc';
  ctx.font='bold '+(9.5*scale)+'px Inter';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  var name = p.name.length>20 ? p.name.substr(0,18)+'…' : p.name;
  ctx.fillText(name, s.x+bw/2, s.y - 8*scale);

  // Repo
  if (scale>0.55) {
    ctx.fillStyle='#8b92b0'; ctx.font=(7.5*scale)+'px Inter';
    var repo = p.repo ? (p.repo.length>22 ? p.repo.substr(0,20)+'…' : p.repo) : '';
    ctx.fillText(repo, s.x+bw/2, s.y+8*scale);
  }

  // Icons
  if (scale>0.6) {
    var icons='';
    if (p.hat_supabase) icons+='🗄';
    if (p.hat_stripe) icons+='💳';
    if (p.tags && p.tags.indexOf('Claude AI')>=0) icons+='🤖';
    if (icons) {
      ctx.font=(9*scale)+'px Inter'; ctx.textAlign='right';
      ctx.fillText(icons, s.x+pw/2-5*scale, s.y-ph/2+10*scale);
    }
  }

  // Status badge
  ctx.fillStyle=st.color; ctx.font='bold '+(7*scale)+'px Inter';
  ctx.textAlign='left';
  ctx.fillText(st.label, s.x-pw/2+7*scale, s.y+ph/2-7*scale);

  // NEU badge
  if (p.tags && p.tags.indexOf('NEU')>=0) {
    var bBw=24*scale, bBh=12*scale;
    ctx.fillStyle='#f59e0b';
    ctx.beginPath(); roundRect(ctx,s.x+pw/2-bBw-3*scale,s.y-ph/2+3*scale,bBw,bBh,3*scale); ctx.fill();
    ctx.fillStyle='#000'; ctx.font='bold '+(7*scale)+'px Inter'; ctx.textAlign='center';
    ctx.fillText('NEU',s.x+pw/2-bBw/2-3*scale,s.y-ph/2+3*scale+bBh/2);
  }

  ctx.textAlign='center';
}

function roundRect(c,x,y,w,h,r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

// ── HIT TESTS ──
function hitHub(wx,wy) {
  if (focusHub) return null;
  for (var i=0;i<HUBS.length;i++) {
    var h=HUBS[i], hp=hubPos[h.id];
    if (!hp) continue;
    var d=Math.sqrt((wx-hp.x)*(wx-hp.x)+(wy-hp.y)*(wy-hp.y));
    if (d<h.r+6) return h;
  }
  return null;
}

function hitNode(wx,wy) {
  var pw=58, ph=24;
  var best=null, bestD=9999;
  Object.keys(positions).forEach(function(key) {
    var pos=positions[key];
    var dx=Math.abs(wx-pos.x), dy=Math.abs(wy-pos.y);
    if (dx<pw && dy<ph) {
      var d=dx+dy;
      if (d<bestD){bestD=d;best={key:key,pos:pos};}
    }
  });
  return best;
}

// ── EVENTS ──
canvas.addEventListener('mousemove', function(e) {
  if (isDrag) {
    offX = dragS.ox + (e.clientX-dragS.x)/scale;
    offY = dragS.oy + (e.clientY-dragS.y)/scale;
    draw(); return;
  }
  var wp = toWorld(e.clientX, e.clientY-56);
  var node = hitNode(wp.x,wp.y);
  var hub = hitHub(wp.x,wp.y);
  var newKey = node ? node.key : null;
  if (newKey!==hoveredKey) { hoveredKey=newKey; draw(); }
  if (node) { canvas.style.cursor='pointer'; showTip(e,node.pos.project,node.pos.hub); }
  else if (hub) { canvas.style.cursor='pointer'; hideTip(); }
  else { canvas.style.cursor='grab'; hideTip(); }
});

canvas.addEventListener('mouseleave', function(){ hideTip(); hoveredKey=null; draw(); });

canvas.addEventListener('mousedown', function(e) {
  isDrag=false;
  dragS={x:e.clientX,y:e.clientY,ox:offX,oy:offY,moved:false};
  canvas.addEventListener('mousemove',trackDrag,{once:false});
  function trackDrag(ev){
    if(Math.abs(ev.clientX-dragS.x)>4||Math.abs(ev.clientY-dragS.y)>4) { isDrag=true; }
  }
  canvas.addEventListener('mouseup', function up(ev){
    canvas.removeEventListener('mousemove',trackDrag);
    canvas.removeEventListener('mouseup',up);
    if(!isDrag) handleClick(ev);
    isDrag=false;
    canvas.style.cursor='grab';
  },{once:true});
});

function handleClick(e) {
  var wp = toWorld(e.clientX, e.clientY-56);
  // Check hub
  var hub = hitHub(wp.x,wp.y);
  if (hub) { zoomToHub(hub.id); return; }
  // Check node
  var node = hitNode(wp.x,wp.y);
  if (node && node.pos.project.live_url) {
    window.open(node.pos.project.live_url,'_blank');
  }
  // Click center or empty → back
  var cDist=Math.sqrt(wp.x*wp.x+wp.y*wp.y);
  if (focusHub && cDist<60) { zoomOut(); }
}

// ── ZOOM TO HUB ──
function zoomToHub(hubId) {
  focusHub = hubId;
  offX=0; offY=0;
  scale=1.1;
  computePositions();
  draw();
  updateBreadcrumb();
}

function zoomOut() {
  focusHub=null;
  offX=0; offY=0; scale=1;
  computePositions();
  draw();
  updateBreadcrumb();
}

function updateBreadcrumb() {
  var bc=document.getElementById('breadcrumb');
  if (focusHub) {
    var h=getHubForId(focusHub);
    var cnt=visibleProjects().length;
    bc.innerHTML='<span style="cursor:pointer;color:#2563eb" onclick="zoomOut()">← Alle</span> › '+h.label.replace('\n',' ')+' · '+cnt+' Projekte · Klick auf Node öffnet GitHub Pages';
    bc.style.pointerEvents='all';
  } else {
    bc.innerHTML='Alle Projekte · Klick auf Hub zum Einzoomen · Klick auf Node öffnet GitHub Pages';
    bc.style.pointerEvents='none';
  }
}

// ── WHEEL ZOOM ──
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var f=e.deltaY<0?1.1:0.9;
  scale=Math.max(0.25,Math.min(3,scale*f));
  draw();
},{passive:false});

// ── TOUCH ──
canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===1){
    isDrag=false;
    dragS={x:e.touches[0].clientX,y:e.touches[0].clientY,ox:offX,oy:offY};
  }
},{passive:true});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===1){
    var dx=e.touches[0].clientX-dragS.x, dy=e.touches[0].clientY-dragS.y;
    if(Math.abs(dx)>3||Math.abs(dy)>3) isDrag=true;
    offX=dragS.ox+dx/scale; offY=dragS.oy+dy/scale; draw();
  } else if(e.touches.length===2){
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(lastPinchDist){scale=Math.max(0.25,Math.min(3,scale*d/lastPinchDist));draw();}
    lastPinchDist=d;
  }
},{passive:false});
canvas.addEventListener('touchend',function(e){
  if(!isDrag&&e.changedTouches.length===1){
    var t=e.changedTouches[0];
    var wp=toWorld(t.clientX,t.clientY-56);
    var hub=hitHub(wp.x,wp.y);
    if(hub){zoomToHub(hub.id);return;}
    var node=hitNode(wp.x,wp.y);
    if(node&&node.pos.project.live_url) window.open(node.pos.project.live_url,'_blank');
    var cDist=Math.sqrt(wp.x*wp.x+wp.y*wp.y);
    if(focusHub&&cDist<60) zoomOut();
  }
  isDrag=false; lastPinchDist=null;
},{passive:true});

// ── TOOLTIP ──
var tip=document.getElementById('tip');
function showTip(e,p,hub) {
  if(!hub) return;
  var st=STATUS[p.status]||STATUS['intern'];
  var icons=[];
  if(p.hat_supabase) icons.push('🗄 Supabase');
  if(p.hat_stripe) icons.push('💳 Stripe');
  if(p.tags&&p.tags.indexOf('Claude AI')>=0) icons.push('🤖 Claude AI');

  tip.innerHTML=
    '<div class="tip-title" style="color:'+hub.color+'">'+p.name+'</div>'+
    '<div class="tip-repo" style="color:'+hub.color+'">'+p.repo+'</div>'+
    (p.beschreibung?'<div class="tip-desc">'+p.beschreibung+'</div>':'')+
    '<div style="display:flex;align-items:center;gap:8px;margin-top:4px">'+
      '<span style="color:'+st.color+';font-weight:700;font-size:11px">'+st.label+'</span>'+
      (p.live_url?'<span style="font-size:10px;color:#8b92b0">↗ öffnet GitHub Pages</span>':'<span style="font-size:10px;color:#6b7280">kein Link</span>')+
    '</div>'+
    (p.tags&&p.tags.length?'<div class="tip-tags">'+p.tags.map(function(t){return'<span class="tip-tag">'+t+'</span>';}).join('')+'</div>':'')+
    (icons.length?'<div class="tip-icons">'+icons.map(function(ic){return'<span>'+ic+'</span>';}).join('')+'</div>':'');

  var tx=e.clientX+16, ty=e.clientY+10;
  if(tx+280>W) tx=e.clientX-290;
  if(ty+200>window.innerHeight) ty=e.clientY-200;
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
  tip.classList.add('show');
}
function hideTip(){tip.classList.remove('show');}

// ── CONTROLS ──
function resetView(){focusHub=null;offX=0;offY=0;scale=1;computePositions();draw();updateBreadcrumb();}
function zoom(f){scale=Math.max(0.25,Math.min(3,scale*f));draw();}

window.addEventListener('resize',resize);
loadData();
</script>
