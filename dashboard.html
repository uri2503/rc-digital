<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rc-digital · Launch-Kontrolle</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #12141c;
    --bg2: #181c27;
    --card: #1f2430;
    --border: rgba(255,255,255,0.08);
    --text: #f4f6fa;
    --muted: #8a92a6;
    --muted2: #5c6478;
    --live: #4ade80;
    --progress: #fbbf24;
    --planned: #60a5fa;
    --accent: #7c9dff;
    --danger: #f87171;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: clamp(1rem, 4vw, 2.5rem);
    -webkit-font-smoothing: antialiased;
  }
  header { max-width: 1400px; margin: 0 auto 2rem; }
  .eyebrow { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 800; letter-spacing: -0.02em; }
  .subtitle { color: var(--muted); font-size: 0.92rem; margin-top: 0.4rem; }

  .overview {
    max-width: 1400px; margin: 0 auto 1.25rem;
    display: flex; gap: 0.75rem; flex-wrap: wrap;
  }
  .overview-pill {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 0.7rem 1.1rem; font-size: 0.82rem; color: var(--muted);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .overview-pill b { color: var(--text); font-size: 0.95rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .filter-bar {
    max-width: 1400px; margin: 0 auto 2rem;
    display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
  }
  .filter-label { font-size: 0.78rem; color: var(--muted2); margin-right: 0.3rem; }
  .filter-chip {
    display: flex; align-items: center; gap: 0.4rem;
    background: var(--card); border: 1px solid var(--border); border-radius: 100px;
    padding: 0.4rem 0.8rem 0.4rem 0.6rem; font-size: 0.8rem; cursor: pointer;
    color: var(--muted); transition: all 0.15s; user-select: none;
  }
  .filter-chip.active { color: var(--text); border-color: var(--accent); }
  .filter-chip .chip-dot { width: 7px; height: 7px; border-radius: 50%; opacity: 0.35; flex-shrink: 0; }
  .filter-chip.active .chip-dot { opacity: 1; }
  .filter-chip-all {
    font-size: 0.78rem; color: var(--accent); cursor: pointer; padding: 0.4rem 0.6rem;
    text-decoration: underline; text-underline-offset: 2px;
  }

  .grid {
    max-width: 1400px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.1rem;
  }

  .tool-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 1.4rem; display: flex; flex-direction: column; gap: 1rem;
  }
  .tool-head { display: flex; align-items: center; gap: 1rem; }
  .ring-wrap { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
  .ring-fg { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
  .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; }

  .tool-title-wrap { flex: 1; min-width: 0; }
  .tool-title { font-size: 1.05rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
  .tool-domain { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
  .status-badge {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 0.2rem 0.55rem; border-radius: 100px; flex-shrink: 0;
  }
  .status-live { background: rgba(74,222,128,0.15); color: var(--live); }
  .status-progress { background: rgba(251,191,36,0.15); color: var(--progress); }
  .status-planned { background: rgba(96,165,250,0.15); color: var(--planned); }

  .checklist { display: flex; flex-direction: column; gap: 0.2rem; }
  .check-item {
    display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.45rem 0.5rem;
    border-radius: 8px; transition: background 0.15s;
    font-size: 0.85rem; position: relative;
  }
  .check-item:hover { background: rgba(255,255,255,0.03); }
  .check-item:hover .del-btn { opacity: 1; }
  .check-item label { display: flex; align-items: flex-start; gap: 0.6rem; flex: 1; cursor: pointer; min-width: 0; }
  .check-item input {
    appearance: none; -webkit-appearance: none;
    width: 17px; height: 17px; border-radius: 5px; border: 1.5px solid var(--muted2);
    flex-shrink: 0; margin-top: 0.1rem; cursor: pointer; position: relative;
    transition: all 0.15s;
  }
  .check-item input:checked { background: var(--live); border-color: var(--live); }
  .check-item input:checked::after {
    content: ''; position: absolute; left: 5px; top: 1px; width: 4px; height: 9px;
    border: solid var(--bg2); border-width: 0 2px 2px 0; transform: rotate(45deg);
  }
  .check-label { color: var(--text); word-break: break-word; }
  .check-item input:checked ~ .check-label { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--muted2); }
  .del-btn {
    opacity: 0; flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted2); cursor: pointer; font-size: 0.9rem; transition: opacity 0.15s, background 0.15s, color 0.15s;
    background: none; border: none;
  }
  .del-btn:hover { background: rgba(248,113,113,0.15); color: var(--danger); }

  .add-item-row {
    display: flex; gap: 0.4rem; margin-top: 0.2rem;
  }
  .add-item-row input {
    flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.5rem 0.65rem; font-size: 0.83rem; color: var(--text);
    outline: none;
  }
  .add-item-row input::placeholder { color: var(--muted2); }
  .add-item-row input:focus { border-color: var(--accent); }
  .add-item-row button {
    background: var(--accent); color: #12141c; border: none; border-radius: 8px;
    padding: 0 0.9rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }
  .add-item-row button:active { transform: scale(0.96); }

  .notes {
    font-size: 0.78rem; color: var(--muted); background: rgba(255,255,255,0.03);
    border-radius: 8px; padding: 0.6rem 0.75rem; border-left: 2px solid var(--accent);
  }

  footer { max-width: 1400px; margin: 2rem auto 0; text-align: center; font-size: 0.75rem; color: var(--muted2); }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">rc-digital · Mein-Auto-Assistent Familie</p>
  <h1>Launch-Kontrolle</h1>
  <p class="subtitle">Status & Testfortschritt aller Tools auf einen Blick. Alles wird automatisch gespeichert und geräteübergreifend synchronisiert. <span id="syncBadge" style="font-weight:600;"></span></p>
</header>

<div class="overview" id="overview"></div>
<div class="filter-bar" id="filterBar"></div>

<div class="grid" id="grid"></div>

<footer>Stand: Juli 2026 · Klick auf ein Häkchen speichert sofort · Eigene Punkte über das Eingabefeld pro Karte</footer>

<script>
const DEFAULT_TOOLS = [
  {
    id: 'betriebspass',
    name: 'Betriebspass',
    domain: 'uri2503.github.io/betriebspass',
    status: 'live',
    statusLabel: 'Live',
    items: [
      { id: 'flow', label: 'Kauf-Flow geprüft', done: true },
      { id: 'access', label: 'Zugriffskontrolle serverseitig', done: true },
      { id: 'priceid', label: 'Price-ID-Bug gefixt', done: true },
      { id: 'firstsale', label: 'Erster echter Verkauf (Fr. Höhn)', done: false },
    ],
    note: 'Wartet auf ersten echten Kauf — sonst technisch fertig.'
  },
  {
    id: 'schadencheck',
    name: 'Schaden-Check',
    domain: 'auto-schadencheck.de',
    status: 'progress',
    statusLabel: 'Testphase',
    items: [
      { id: 'flow', label: 'Kauf-Flow geprüft', done: true },
      { id: 'access', label: 'Zugriffskontrolle gefixt', done: true },
      { id: 'xss', label: 'XSS-Lücke gefixt', done: true },
      { id: 'faq', label: 'FAQ + Support-Link eingebaut', done: true },
      { id: 'dns', label: 'Custom Domain DNS live', done: false },
      { id: 'test1', label: 'Testdurchlauf 1: echter Kauf', done: false },
      { id: 'test2', label: 'Testdurchlauf 2: DAU-Fehleingaben', done: false },
      { id: 'test3', label: 'Testdurchlauf 3: zweites Gerät', done: false },
    ],
    note: 'DNS-Umstellung läuft, danach die 3 Testdurchläufe.'
  },
  {
    id: 'unfallcheck',
    name: 'Auto-Unfallcheck',
    domain: 'auto-unfallcheck.de',
    status: 'progress',
    statusLabel: 'Testphase',
    items: [
      { id: 'flow', label: 'Kauf-Flow geprüft', done: true },
      { id: 'access', label: 'Zugriffskontrolle sauber', done: true },
      { id: 'xss', label: 'Kein XSS-Fund', done: true },
      { id: 'faq', label: 'FAQ + Support-Link eingebaut', done: true },
      { id: 'test1', label: 'Testdurchlauf 1: echter Kauf', done: false },
      { id: 'test2', label: 'Testdurchlauf 2: DAU-Fehleingaben', done: false },
      { id: 'test3', label: 'Testdurchlauf 3: zweites Gerät', done: false },
    ],
    note: 'Bereit für die 3 Testdurchläufe, parallel zu Schaden-Check.'
  },
  {
    id: 'huvorab',
    name: 'HU-Vorab-Check',
    domain: 'GTÜ Pilot · Steffen Höhn',
    status: 'progress',
    statusLabel: 'Pilot läuft',
    items: [
      { id: 'flow', label: 'Kauf-Flow geprüft', done: true },
      { id: 'access', label: 'Zugriffskontrolle vorbildlich', done: true },
      { id: 'xss', label: 'Kein XSS-Fund', done: true },
      { id: 'kennzeichen', label: 'Kennzeichen-Tracker (P1)', done: false },
      { id: 'kalender', label: 'Terminkalender (P1)', done: false },
      { id: 'whatsapp', label: 'WhatsApp auf Steffen umstellen', done: false },
    ],
    note: 'Technisch sauber. Offene Punkte sind Feature-Ausbau, kein Bugfixing.'
  },
  {
    id: 'wertcheck',
    name: 'Auto-Wertcheck',
    domain: 'auto-wertcheck.de',
    status: 'progress',
    statusLabel: '95% – visuell offen',
    items: [
      { id: 'flow', label: 'Kauf-Flow geprüft', done: true },
      { id: 'access', label: 'Zugriffskontrolle sauber', done: true },
      { id: 'xss', label: 'XSS-Lücke gefixt (Archiv)', done: true },
      { id: 'servicekey', label: 'Service-Key gestärkt', done: true },
      { id: 'visuell', label: 'Visuelle Anpassungen', done: false },
      { id: 'faq', label: 'FAQ + Support-Link', done: false },
    ],
    note: 'Deine Einschätzung: 95%. Noch visuell nachschärfen.'
  },
  {
    id: 'anzeigenautopilot',
    name: 'AnzeigenAutopilot',
    domain: 'anzeigenautopilot.de',
    status: 'planned',
    statusLabel: 'Kein Druck aktuell',
    items: [
      { id: 'flow', label: 'Kauf-Flow geprüft', done: true },
      { id: 'access', label: 'Bezahlte Credits sauber', done: true },
      { id: 'credits', label: 'Credit-Farming-Fix (IP-Limit)', done: true },
      { id: 'dns', label: 'DNS für eigene Domain', done: false },
    ],
    note: 'Technisch bereit, aber kein aktueller Vermarktungsdruck.'
  },
];

const STORAGE_KEY = 'rc_launch_checklist_state_v2';
const OLD_STORAGE_KEY = 'rc_launch_checklist_state';
const SUPA_URL = 'https://ysqzdqazcgyuzdorauiq.supabase.co';
const SUPA_KEY = 'sb_publishable_v4kXJa0y-2EHsCFPqBFHfg_QvzKLnt2';
const SUPA_HEADERS = { 'Content-Type': 'application/json', 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY };
let saveTimer = null;
let syncStatus = 'idle'; // idle | saving | saved | error

function loadState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // Migration vom alten, einfacheren Format (nur Checks, keine eigenen Punkte/Filter)
      const old = localStorage.getItem(OLD_STORAGE_KEY);
      if (old) {
        const oldChecks = JSON.parse(old);
        const migrated = { checks: oldChecks, customItems: {}, removedDefaults: {}, visibility: {} };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
        return migrated;
      }
    }
    const s = JSON.parse(raw || '{}');
    if (!s.checks) s.checks = {};
    if (!s.customItems) s.customItems = {};
    if (!s.removedDefaults) s.removedDefaults = {};
    if (!s.visibility) s.visibility = {};
    return s;
  } catch(e) {
    return { checks: {}, customItems: {}, removedDefaults: {}, visibility: {} };
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  scheduleCloudSave();
}

function scheduleCloudSave() {
  syncStatus = 'saving';
  renderSyncBadge();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(cloudSaveNow, 600);
}

function cloudSaveNow() {
  fetch(SUPA_URL + '/rest/v1/rc_dashboard_state?id=eq.main', {
    method: 'PATCH',
    headers: { ...SUPA_HEADERS, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ state: state, updated_at: new Date().toISOString() })
  }).then(r => {
    syncStatus = r.ok ? 'saved' : 'error';
    renderSyncBadge();
  }).catch(() => {
    syncStatus = 'error';
    renderSyncBadge();
  });
}

function cloudLoadOnce() {
  fetch(SUPA_URL + '/rest/v1/rc_dashboard_state?id=eq.main&select=state', {
    headers: SUPA_HEADERS
  }).then(r => r.json()).then(rows => {
    if (rows && rows[0] && rows[0].state && Object.keys(rows[0].state).length) {
      // Cloud-Stand vorhanden -- übernimmt lokalen Stand als aktuelle Wahrheit
      const cloud = rows[0].state;
      state = {
        checks: cloud.checks || {},
        customItems: cloud.customItems || {},
        removedDefaults: cloud.removedDefaults || {},
        visibility: cloud.visibility || {}
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      syncStatus = 'saved';
      render();
    } else {
      // Noch kein Cloud-Stand -- lokalen Stand initial hochladen
      cloudSaveNow();
    }
  }).catch(() => {
    syncStatus = 'error';
    renderSyncBadge();
  });
}

function renderSyncBadge() {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  const map = {
    idle: ['●', 'var(--muted2)', 'Bereit'],
    saving: ['●', 'var(--progress)', 'Speichert…'],
    saved: ['●', 'var(--live)', 'Synchronisiert'],
    error: ['●', 'var(--danger)', 'Offline / Fehler — lokal gespeichert']
  };
  const [dot, color, label] = map[syncStatus];
  el.innerHTML = `<span style="color:${color}">${dot}</span> ${label}`;
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function statusColor(status) {
  return status === 'live' ? 'var(--live)' : status === 'progress' ? 'var(--progress)' : 'var(--planned)';
}
function statusClass(status) {
  return status === 'live' ? 'status-live' : status === 'progress' ? 'status-progress' : 'status-planned';
}

let state = loadState();

function isVisible(toolId) {
  return state.visibility[toolId] !== false;
}
function toggleVisibility(toolId) {
  state.visibility[toolId] = !isVisible(toolId);
  saveState();
  render();
}
function showAll() {
  DEFAULT_TOOLS.forEach(t => { state.visibility[t.id] = true; });
  saveState();
  render();
}

function getItemsForTool(tool) {
  const removed = state.removedDefaults[tool.id] || [];
  const base = tool.items.filter(i => !removed.includes(i.id));
  const custom = state.customItems[tool.id] || [];
  return base.concat(custom).map(item => {
    const overrideDone = state.checks[tool.id] ? state.checks[tool.id][item.id] : undefined;
    return {
      id: item.id,
      label: item.label,
      done: overrideDone !== undefined ? overrideDone : item.done,
      isCustom: custom.some(c => c.id === item.id)
    };
  });
}

function setDone(toolId, itemId, val) {
  if (!state.checks[toolId]) state.checks[toolId] = {};
  state.checks[toolId][itemId] = val;
  saveState();
  render();
}

function addItem(toolId) {
  const input = document.getElementById('add-input-' + toolId);
  const text = input.value.trim();
  if (!text) return;
  if (!state.customItems[toolId]) state.customItems[toolId] = [];
  const newId = 'custom_' + Date.now();
  state.customItems[toolId].push({ id: newId, label: text, done: false });
  saveState();
  render();
  // Fokus nach Re-Render wiederherstellen
  setTimeout(() => {
    const el = document.getElementById('add-input-' + toolId);
    if (el) el.focus();
  }, 0);
}

function removeItem(toolId, itemId, isCustom) {
  if (isCustom) {
    state.customItems[toolId] = (state.customItems[toolId] || []).filter(i => i.id !== itemId);
  } else {
    if (!state.removedDefaults[toolId]) state.removedDefaults[toolId] = [];
    if (!state.removedDefaults[toolId].includes(itemId)) state.removedDefaults[toolId].push(itemId);
  }
  saveState();
  render();
}

function handleAddKeydown(e, toolId) {
  if (e.key === 'Enter') addItem(toolId);
}

function renderOverview(visibleTools) {
  const wrap = document.getElementById('overview');
  const counts = { live: 0, progress: 0, planned: 0 };
  visibleTools.forEach(t => counts[t.status]++);
  let totalItems = 0, doneItems = 0;
  visibleTools.forEach(t => {
    const items = getItemsForTool(t);
    totalItems += items.length;
    doneItems += items.filter(i => i.done).length;
  });
  wrap.innerHTML = `
    <div class="overview-pill"><span class="dot" style="background:var(--live)"></span> ${counts.live} live</div>
    <div class="overview-pill"><span class="dot" style="background:var(--progress)"></span> ${counts.progress} in Testphase</div>
    <div class="overview-pill"><span class="dot" style="background:var(--planned)"></span> ${counts.planned} geplant</div>
    <div class="overview-pill"><b>${doneItems}/${totalItems}</b>&nbsp;Punkte insgesamt erledigt</div>
  `;
}

function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  const chips = DEFAULT_TOOLS.map(tool => {
    const active = isVisible(tool.id);
    const color = statusColor(tool.status);
    return `
      <div class="filter-chip ${active ? 'active' : ''}" onclick="toggleVisibility('${tool.id}')">
        <span class="chip-dot" style="background:${color}"></span>
        ${esc(tool.name)}
      </div>
    `;
  }).join('');
  bar.innerHTML = `<span class="filter-label">Anzeigen:</span>${chips}<span class="filter-chip-all" onclick="showAll()">Alle einblenden</span>`;
}

function render() {
  renderFilterBar();
  const visibleTools = DEFAULT_TOOLS.filter(t => isVisible(t.id));
  renderOverview(visibleTools);

  const grid = document.getElementById('grid');
  if (visibleTools.length === 0) {
    grid.innerHTML = `<div class="notes" style="grid-column:1/-1;text-align:center;padding:2rem;">Keine Tools ausgewählt — oben in der Filterleiste welche einblenden.</div>`;
    return;
  }

  grid.innerHTML = visibleTools.map(tool => {
    const items = getItemsForTool(tool);
    const total = items.length;
    const done = items.filter(i => i.done).length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    const circumference = 2 * Math.PI * 24;
    const offset = circumference - (pct / 100) * circumference;
    const color = statusColor(tool.status);

    const itemsHtml = items.map(item => `
      <div class="check-item">
        <label>
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="setDone('${tool.id}','${item.id}', this.checked)">
          <span class="check-label">${esc(item.label)}</span>
        </label>
        <button class="del-btn" onclick="removeItem('${tool.id}','${item.id}', ${item.isCustom})" title="Entfernen">✕</button>
      </div>
    `).join('');

    return `
      <div class="tool-card">
        <div class="tool-head">
          <div class="ring-wrap">
            <svg width="56" height="56" viewBox="0 0 56 56">
              <circle class="ring-bg" cx="28" cy="28" r="24"></circle>
              <circle class="ring-fg" cx="28" cy="28" r="24"
                stroke="${color}"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}"></circle>
            </svg>
            <div class="ring-pct">${pct}%</div>
          </div>
          <div class="tool-title-wrap">
            <div class="tool-title">${esc(tool.name)}</div>
            <div class="tool-domain">${esc(tool.domain)}</div>
          </div>
          <span class="status-badge ${statusClass(tool.status)}">${esc(tool.statusLabel)}</span>
        </div>
        <div class="checklist">${itemsHtml}</div>
        <div class="add-item-row">
          <input type="text" id="add-input-${tool.id}" placeholder="Eigenen Punkt hinzufügen…" onkeydown="handleAddKeydown(event, '${tool.id}')">
          <button onclick="addItem('${tool.id}')">+</button>
        </div>
        ${tool.note ? `<div class="notes">${esc(tool.note)}</div>` : ''}
      </div>
    `;
  }).join('');
}

render();
renderSyncBadge();
cloudLoadOnce();
</script>

</body>
</html>
